<h2 mat-dialog-title class="dialog-title">Add Session</h2>

<mat-dialog-content class="dialog-content">
  <form [formGroup]="form" class="form-container">

    <!-- Dates Row -->
    <div class="row">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Start Date</mat-label>
        <input matInput type="date" formControlName="startDate">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>End Date</mat-label>
        <input matInput type="date" formControlName="endDate">
      </mat-form-field>
    </div>

    <!-- Committee Members -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Committee Members</mat-label>
      <mat-select formControlName="committeeMembers" multiple>
        <mat-option *ngFor="let u of users() ?? []" [value]="u.id">
          {{ u.name }} {{ u.secondName }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <!-- Head -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Head of Committee</mat-label>
      <mat-select formControlName="headOfCommittee">
        <mat-option *ngFor="let u of users() ?? []" [value]="u.id">
          {{ u.name }} {{ u.secondName }}
        </mat-option>
      </mat-select>
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>
