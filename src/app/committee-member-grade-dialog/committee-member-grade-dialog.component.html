<h2 mat-dialog-title class="text-center">Submit Evaluation</h2>

<form [formGroup]="form">

  <div mat-dialog-content>

    <div class="form-grid-horizontal">

      @for (field of [
        { key: 'contentScore', label: 'Content' },
        { key: 'complexityScore', label: 'Complexity' },
        { key: 'appearanceScore', label: 'Appearance' },
        { key: 'presentationScore', label: 'Presentation' }
      ]; track field.key) {

        <div class="form-col">
          <div class="label">{{ field.label }}</div>

          <input
            type="number"
            min="1"
            max="5"
            step="0.1"
            [formControlName]="field.key"
            class="score-input"
          />

        </div>

      }

    </div>

  </div>

  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-button 
            type="button"
            [disabled]="form.invalid"
            (click)="submit()">
      Submit
    </button>
  </div>

</form>
