<mat-card class="page-card">

  <div class="page-header">
    <h2>Theses</h2>
    <ng-container *appHasAuthority="'SUPERVISOR'">
      <button mat-raised-button color="primary" (click)="onAddThesis()">
      <mat-icon>add</mat-icon>
      Add Thesis
    </button>
    </ng-container>
  </div>
  <table mat-table [dataSource]="thesises" class="thesis-table">

    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let thesis">{{ thesis.id }}</td>
    </ng-container>

    <!-- Student -->
    <ng-container matColumnDef="studentName">
      <th mat-header-cell *matHeaderCellDef>Student</th>
      <td mat-cell *matCellDef="let thesis">{{ thesis.studentName }}</td>
    </ng-container>

    <!-- Level -->
    <ng-container matColumnDef="levelOfStudies">
      <th mat-header-cell *matHeaderCellDef>Level</th>
      <td mat-cell *matCellDef="let thesis">{{ thesis.levelOfStudies }}</td>
    </ng-container>

    <!-- Language -->
    <ng-container matColumnDef="languageOfThesis">
      <th mat-header-cell *matHeaderCellDef>Language</th>
      <td mat-cell *matCellDef="let thesis">{{ thesis.languageOfThesis }}</td>
    </ng-container>

    <!-- Title -->
    <ng-container matColumnDef="titleEstonian">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let thesis">{{ thesis.titleEstonian }}</td>
    </ng-container>

    <ng-container matColumnDef="finalGrade">
      <th mat-header-cell *matHeaderCellDef>Grade</th>
      <td mat-cell *matCellDef="let thesis">{{ thesis.finalGrade? thesis.finalGrade : 'Not graded' }}</td>
    </ng-container>

    <!-- Action -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let thesis">
        <button mat-raised-button color="primary"
                [routerLink]="['/thesis', thesis.id]">
          View
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

  </table>

</mat-card>
