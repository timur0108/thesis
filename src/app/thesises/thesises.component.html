<!-- thesises.component.html -->
<div class="thesises-container">
  <h2>Thesises</h2>

  <table mat-table [dataSource]="thesises" class="mat-elevation-z8" style="width: 100%;">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let thesis"> {{thesis.id}} </td>
    </ng-container>

    <!-- Student Name Column -->
    <ng-container matColumnDef="studentName">
      <th mat-header-cell *matHeaderCellDef> Student </th>
      <td mat-cell *matCellDef="let thesis"> {{thesis.studentName}} </td>
    </ng-container>

    <!-- Level of Studies Column -->
    <ng-container matColumnDef="levelOfStudies">
      <th mat-header-cell *matHeaderCellDef> Level </th>
      <td mat-cell *matCellDef="let thesis"> {{thesis.levelOfStudies}} </td>
    </ng-container>

    <!-- Language Column -->
    <ng-container matColumnDef="languageOfThesis">
      <th mat-header-cell *matHeaderCellDef> Language </th>
      <td mat-cell *matCellDef="let thesis"> {{thesis.languageOfThesis}} </td>
    </ng-container>

    <!-- Title Column -->
    <ng-container matColumnDef="titleEstonian">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let thesis"> {{thesis.titleEstonian}} </td>
    </ng-container>

    <!-- Action Column -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef> </th>
      <td mat-cell *matCellDef="let thesis">
        <button mat-button color="primary" [routerLink]="['/thesis', thesis.id]">
          View Details
        </button>
      </td>
    </ng-container>

    <!-- Header and Row Definitions -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>
</div>
